name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Cross-platform build + test (471+ tests) ──────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --verbose
      - name: Test (workspace, default features)
        run: cargo test --workspace --verbose
      - name: Test gizmo-net (feature-gated backends)
        run: cargo test -p gizmo-net --features client-server,rollback

  # ── Lint: rustfmt (report-only) + clippy (-D warnings, ratcheted) ─────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      # Report-only: kod tabanı henüz tam rustfmt uyumlu değil (kademeli temizlenecek).
      - name: Rustfmt check (report-only)
        run: cargo fmt --all --check
        continue-on-error: true
      # `-D warnings` gerçek bir kapıdır. Mevcut (grandfather'lı) lint'ler `-A` ile
      # muaf tutulur — bu bir RATCHET: YENİ lint türleri CI'yı kırar, mevcut backlog
      # zamanla temizlendikçe ilgili `-A` satırı kaldırılır.
      #
      # 2026-06-12: backlog temizliği — 17 muaf lint → 2'ye indi (bkz. git log).
      # Kalan ikisi mimari: `too_many_arguments`/`type_complexity` fonksiyon
      # imzalarını struct'a sarmadan refactor edilemez, ayrı bir iş. Tek meşru
      # `needless_range_loop` istisnası (determinizm-kritik PGS solver) global
      # `-A` yerine solver.rs'te yerel `#[allow]` + gerekçeyle dokümante edildi.
      #
      # 2026-07-01: `--all-features --all-targets`'a sıkılaştırıldı — test + bench
      # + tüm-feature yüzeyi de artık kapının içinde (önceki test/bench backlog'u
      # temizlendi: benchmark payload'larına dosya-içi dead_code allow, test
      # modüllerine hedefli field_reassign allow, gerisi gerçek düzeltme).
      - name: Clippy (-D warnings, ratcheted, all-features + all-targets)
        run: |
          cargo clippy --workspace --all-features --all-targets -- -D warnings \
            -A clippy::too_many_arguments -A clippy::type_complexity

  # ── Optional features: the `reflect` path must build + test (ubuntu only) ──
  features:
    name: Features (reflect)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Test Stage A crates with `reflect`
        run: cargo test -p gizmo-core -p gizmo-physics-core -p gizmo-physics-rigid -p gizmo-scene --features reflect

  # ── MSRV gate: workspace must build on the declared rust-version (1.92) ────
  msrv:
    name: MSRV (1.92)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Check (workspace, MSRV toolchain)
        run: cargo check --workspace

  # ── Determinism & stability: 3× tower collapse, hashes must match ─────────
  determinism:
    name: Determinism & Stability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Headless stress test (200-box tower, 3 runs, hash match)
        run: cargo run --release -p demo --bin headless_stress_test

  # ── WASM: the sim core AND the browser graphics stack must compile to wasm32 ─
  # Locks (a) the deterministic simulation core (math/core/physics/ai/animation/
  # scene), and (b) the WebGPU browser stack: renderer, windowed app runtime and
  # the `demo-web` browser demo (facade with the web feature subset — audio,
  # network, editor and scripting stay native-only for now, see RELEASING §4g).
  # `demo-web` was verified end-to-end in headless Chrome (WebGPU adapter,
  # 90 rendered frames, scene pixels) on 2026-07-02; this gate keeps it building.
  wasm:
    name: WASM (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build simulation core for wasm32
        run: |
          cargo build --target wasm32-unknown-unknown \
            -p gizmo-math -p gizmo-core -p gizmo-physics-core -p gizmo-physics-rigid \
            -p gizmo-physics-soft -p gizmo-ai -p gizmo-animation -p gizmo-scene
      - name: Build browser graphics stack for wasm32 (renderer + app + facade)
        run: |
          cargo build --target wasm32-unknown-unknown -p gizmo-renderer
          cargo build --target wasm32-unknown-unknown -p gizmo-app \
            --no-default-features --features render,physics,scene
          cargo build --target wasm32-unknown-unknown -p demo-web

  # ── Miri: the ECS unsafe surface must be free of undefined behaviour ───────
  # Runs the pointer/aliasing-heavy gizmo-core modules under Miri (Tree Borrows).
  # This fences the archetype-migration disjoint-borrow invariant: taking two
  # `&mut archetypes[i] as *mut` at once was aliasing UB — the fix uses
  # `get_disjoint_mut`, and these tests exercise every migration/swap-remove path.
  # The parallel scheduler is excluded on purpose: its crossbeam-epoch dependency
  # only trips the *experimental* Stacked Borrows model and is not gizmo code.
  miri:
    name: Miri (ECS soundness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Miri test (ECS unsafe surface, Tree Borrows)
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-tree-borrows -Zmiri-ignore-leaks"
        run: |
          cargo miri test -p gizmo-core --lib world::component_ops
          cargo miri test -p gizmo-core --lib commands::
          cargo miri test -p gizmo-core --lib archetype::tests
          cargo miri test -p gizmo-core --lib archetype::blob
          cargo miri test -p gizmo-core --lib query::tests
          cargo miri test -p gizmo-core --lib hierarchy::tests
