name: Physics Determinism CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Cross-Platform Determinism Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
        
    - name: Install Linux Dependencies
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
        
    - name: Cache Cargo Registry & Target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check Formatting
      run: cargo fmt --all -- --check
      continue-on-error: true

    - name: Run Determinism CI Tests
      run: cargo test -p gizmo-physics --test determinism --verbose

    - name: Run All Engine Tests
      run: cargo test --verbose
