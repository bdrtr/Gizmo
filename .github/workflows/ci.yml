name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Cross-platform build + test (471+ tests) ──────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --verbose
      - name: Test (workspace, default features)
        run: cargo test --workspace --verbose
      - name: Test gizmo-net (feature-gated backends)
        run: cargo test -p gizmo-net --features client-server,rollback

  # ── Lint: rustfmt (report-only) + clippy (-D warnings, ratcheted) ─────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      # Report-only: kod tabanı henüz tam rustfmt uyumlu değil (kademeli temizlenecek).
      - name: Rustfmt check (report-only)
        run: cargo fmt --all --check
        continue-on-error: true
      # `-D warnings` gerçek bir kapıdır. Mevcut (grandfather'lı) lint'ler `-A` ile
      # muaf tutulur — bu bir RATCHET: YENİ lint türleri CI'yı kırar, mevcut backlog
      # zamanla temizlendikçe ilgili `-A` satırı kaldırılır.
      #
      # 2026-06-12: backlog temizliği — 17 muaf lint → 2'ye indi (bkz. git log).
      # Kalan ikisi mimari: `too_many_arguments`/`type_complexity` fonksiyon
      # imzalarını struct'a sarmadan refactor edilemez, ayrı bir iş. Tek meşru
      # `needless_range_loop` istisnası (determinizm-kritik PGS solver) global
      # `-A` yerine solver.rs'te yerel `#[allow]` + gerekçeyle dokümante edildi.
      #
      # 2026-07-01: `--all-features --all-targets`'a sıkılaştırıldı — test + bench
      # + tüm-feature yüzeyi de artık kapının içinde (önceki test/bench backlog'u
      # temizlendi: benchmark payload'larına dosya-içi dead_code allow, test
      # modüllerine hedefli field_reassign allow, gerisi gerçek düzeltme).
      - name: Clippy (-D warnings, ratcheted, all-features + all-targets)
        run: |
          cargo clippy --workspace --all-features --all-targets -- -D warnings \
            -A clippy::too_many_arguments -A clippy::type_complexity

  # ── Optional features: the `reflect` path must build + test (ubuntu only) ──
  features:
    name: Features (reflect)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Test Stage A crates with `reflect`
        run: cargo test -p gizmo-core -p gizmo-physics-core -p gizmo-physics-rigid -p gizmo-scene --features reflect

  # ── MSRV gate: workspace must build on the declared rust-version (1.92) ────
  msrv:
    name: MSRV (1.92)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Check (workspace, MSRV toolchain)
        run: cargo check --workspace

  # ── Determinism & stability: 3× tower collapse, hashes must match ─────────
  determinism:
    name: Determinism & Stability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: Headless stress test (200-box tower, 3 runs, hash match)
        run: cargo run --release -p demo --bin headless_stress_test

  # ── WASM: the deterministic simulation core must compile to wasm32 ─────────
  # Locks the browser-target build of math/core/physics/ai/animation/scene.
  # Renderer/windowing/audio/net wasm backends are deferred (see RELEASING §4g),
  # so they are intentionally NOT part of this gate.
  wasm:
    name: WASM sim-core (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build simulation core for wasm32
        run: |
          cargo build --target wasm32-unknown-unknown \
            -p gizmo-math -p gizmo-core -p gizmo-physics-core -p gizmo-physics-rigid \
            -p gizmo-physics-soft -p gizmo-ai -p gizmo-animation -p gizmo-scene
