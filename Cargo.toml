[workspace]
resolver = "2"
members = [
    "crates/*",
    "crates/gizmo-renderer",
    "crates/gizmo-window",
    "crates/gizmo-physics-core",
    "crates/gizmo-physics-rigid",
    "crates/gizmo-physics-soft",
    "crates/gizmo-physics-dynamics",
    "crates/gizmo-app",
    "crates/gizmo-scripting",
    "crates/gizmo-scene",
    "crates/gizmo-network",
    "server", "demo", "cradle"
]

[workspace.package]
version = "0.1.4"
edition = "2021"
authors = ["Bedir"]
description = "A custom ECS and physics engine aimed for realistic simulations."
license = "MIT OR Apache-2.0"
readme = "README.md"
repository = "https://git.bedirkaraabali.com/bdrtr/Yelbegen-engine"

# Bağımlılıkları tek bir yerden yönetmek için (Inherited Dependencies)
[workspace.dependencies]
winit = "0.29"
mimalloc = { version = "0.1", default-features = false }
