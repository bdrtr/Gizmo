[workspace]
resolver = "2"
members = [
    "crates/*",
    "crates/yelbegen-renderer",
    "crates/yelbegen-window",
    "crates/yelbegen-physics",
    "crates/yelbegen-editor",
    "crates/yelbegen-app",
    "demo",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Bedir"]
description = "A custom ECS and physics engine aimed for realistic simulations."

# Bağımlılıkları tek bir yerden yönetmek için (Inherited Dependencies)
[workspace.dependencies]
winit = "0.29"
