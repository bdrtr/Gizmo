[workspace]
resolver = "2"
members = [
    "crates/*",
    "crates/gizmo-renderer",
    "crates/gizmo-window",
    "crates/gizmo-physics",
    "crates/gizmo-editor",
    "crates/gizmo-app",
    "crates/gizmo-scripting",
    "crates/gizmo-scene",
    "server", "tut", "cradle"
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Bedir"]
description = "A custom ECS and physics engine aimed for realistic simulations."

# Bağımlılıkları tek bir yerden yönetmek için (Inherited Dependencies)
[workspace.dependencies]
winit = "0.29"
