[package]
name = "gizmo-editor"
version.workspace = true
edition.workspace = true

[dependencies]
winit = { workspace = true }
wgpu = "0.19"
egui = "0.26"
egui-winit = "0.26"
egui-wgpu = "0.26"
gizmo-core = { path = "../gizmo-core" }
gizmo-math = { path = "../gizmo-math" }
gizmo-physics = { path = "../gizmo-physics" }
gizmo-renderer = { path = "../gizmo-renderer" }
gizmo-audio = { path = "../gizmo-audio" }
egui_dock = { version = "0.11", features = ["serde"] }
egui-gizmo = "0.16.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
toml = "0.8"
rfd = "0.17.2"
gizmo-scripting = { version = "0.1.0", path = "../gizmo-scripting" }
