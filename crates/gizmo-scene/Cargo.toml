[package]
name = "gizmo-scene"
version.workspace = true
edition.workspace = true

[dependencies]
gizmo-core = { path = "../gizmo-core" }
gizmo-math = { path = "../gizmo-math" }
gizmo-physics = { path = "../gizmo-physics" }
gizmo-renderer = { path = "../gizmo-renderer" }
serde = { version = "1.0", features = ["derive"] }
wgpu = "0.19"
gizmo-audio = { path = "../gizmo-audio" }
gizmo-scripting = { path = "../gizmo-scripting" }
ron = "0.12.1"
uuid = { version = "1.23.0", features = ["v4", "serde"] }
