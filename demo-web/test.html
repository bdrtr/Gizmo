<!DOCTYPE html>
<!-- Headless doğrulama koşum sayfası (CI/manuel): motoru başlatır, 90 kare
     sayar, canvas piksellerini örnekleyip sonucu /report?r=… beacon'ıyla
     sunucu loguna yazar. Üretim sayfası index.html'dir. -->
<html lang="tr">
<head><meta charset="utf-8"><title>Gizmo Web Demo — test harness</title>
<style>html,body{margin:0;height:100%;background:#0d1117}canvas{display:block}</style>
</head>
<body>
<script type="module">
  const report = (obj) =>
    fetch('/report?r=' + encodeURIComponent(JSON.stringify(obj))).catch(() => {});
  window.addEventListener('error', (e) => report({ fatal: String(e.message) }));
  window.addEventListener('unhandledrejection', (e) => report({ fatal: String(e.reason) }));

  try {
    if (!navigator.gpu) { report({ fatal: 'no webgpu' }); throw new Error('no webgpu'); }
    const { default: init } = await import('./pkg/demo_web.js');
    await init();
    report({ boot: 'ok' });

    // Motor kendi canvas'ını body'ye ekler; kareleri rAF ile say, sonra
    // canvas'ı 2D'ye kopyalayıp piksel istatistiği çıkar. Canvas async GPU
    // init'ten sonra belirir → önce onu bekle (aksi halde 90 kare boş geçip
    // "hazır" gibi görünebilir), ancak makine yavaşsa süresiz bekleme.
    let frames = 0, waited = 0;
    const t0 = performance.now();
    const tick = () => {
      if (!document.querySelector('canvas')) {
        if (++waited > 600) { report({ fatal: 'canvas 10sn icinde olusmadi' }); return; }
        requestAnimationFrame(tick);
        return;
      }
      frames++;
      // 30. karede canvas'a sentetik sol tık: demo'nun jest-tetiklemeli
      // WebAudio yolunu (AudioManager + beep) sürer. Headless koşuda
      // --autoplay-policy=no-user-gesture-required ile ses gerçekten başlar;
      // sonuç konsol logundan ("[demo-web] audio: ...") okunur.
      if (frames === 30) {
        const cv = document.querySelector('canvas');
        if (cv) {
          const opts = { bubbles: true, cancelable: true, pointerId: 1, button: 0, buttons: 1, clientX: 320, clientY: 180 };
          cv.dispatchEvent(new PointerEvent('pointerdown', opts));
          cv.dispatchEvent(new PointerEvent('pointerup', { ...opts, buttons: 0 }));
        }
      }
      if (frames < 90) { requestAnimationFrame(tick); return; }
      const canvas = document.querySelector('canvas');
      if (!canvas) { report({ fatal: 'no canvas' }); return; }
      const w = canvas.width, h = canvas.height;
      const c2 = document.createElement('canvas');
      c2.width = w; c2.height = h;
      const ctx = c2.getContext('2d');
      ctx.drawImage(canvas, 0, 0);
      const px = ctx.getImageData(0, 0, w, h).data;
      const colors = new Set();
      let nonZero = 0;
      for (let i = 0; i < px.length; i += 16 * 4) { // her 16. piksel
        const r = px[i], g = px[i + 1], b = px[i + 2];
        if (r + g + b > 12) nonZero++;
        colors.add((r >> 4) + '.' + (g >> 4) + '.' + (b >> 4));
      }
      report({
        frames,
        elapsed_ms: Math.round(performance.now() - t0),
        canvas: w + 'x' + h,
        sampled: px.length / (16 * 4) | 0,
        non_black: nonZero,
        distinct_colors: colors.size,
      });
    };
    requestAnimationFrame(tick);
  } catch (e) {
    report({ fatal: String(e) });
  }
</script>
</body>
</html>
